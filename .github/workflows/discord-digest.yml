name: Post Digest to Discord

on:
  push:
    paths:
      - 'digests/*.md'

jobs:
  post-to-discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new digest file
        id: find-digest
        run: |
          # Get the most recently added/modified digest file
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'digests/*.md' | head -1)
          if [ -z "$FILE" ]; then
            echo "No new digest file found"
            exit 0
          fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "Found digest: $FILE"

      - name: Post to Discord
        if: steps.find-digest.outputs.file
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          FILE="${{ steps.find-digest.outputs.file }}"

          python3 << 'PYEOF'
          import json, subprocess, time, os

          webhook_url = os.environ["DISCORD_WEBHOOK_URL"]

          with open("${{ steps.find-digest.outputs.file }}", "r") as f:
              content = f.read().strip()

          # Split on --- separators into sections
          sections = [s.strip() for s in content.split("\n---\n") if s.strip()]

          # Build messages that fit within 2000 chars
          messages = []
          current = ""
          for section in sections:
              # If adding this section would exceed limit, flush current
              if current and len(current) + len("\n\n") + len(section) > 1900:
                  messages.append(current)
                  current = section
              elif current:
                  current += "\n\n---\n\n" + section
              else:
                  current = section

              # If single section is too long, split it further
              while len(current) > 1900:
                  # Find last newline before 1900 chars
                  split_at = current.rfind("\n", 0, 1900)
                  if split_at == -1:
                      split_at = 1900
                  messages.append(current[:split_at])
                  current = current[split_at:].strip()

          if current:
              messages.append(current)

          # Post each message to Discord
          for i, msg in enumerate(messages):
              payload = json.dumps({"content": msg})
              result = subprocess.run(
                  ["curl", "-s", "-w", "%{http_code}", "-H", "Content-Type: application/json",
                   "-d", payload, webhook_url],
                  capture_output=True, text=True
              )
              print(f"Message {i+1}/{len(messages)}: HTTP {result.stdout[-3:]}")
              if i < len(messages) - 1:
                  time.sleep(2)

          print(f"Posted {len(messages)} messages to Discord!")
          PYEOF
